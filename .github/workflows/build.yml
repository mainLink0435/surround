      - name: Generate dockcross script
        run: docker run --rm dockcross/android-arm:latest > dockcross && chmod +x dockcross

      - name: Build libopenmpt engine (ARMv7 Android)
        run: |
          ./dockcross bash -c "
            cd /work/openmpt &&
            make -j$(nproc) TEST=0 EXAMPLES=0 OPENMPT123=0 IN_OPENMPT=0 XMP_OPENMPT=0 FUZZ=0 \
                 CONFIG=clang LOCAL_ZLIB=1 MPT_COMPILER_NOVISIBILITY=1 \
                 install PREFIX=/work/install-shadow/android-armv7
