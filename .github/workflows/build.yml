  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-aarch64-coreelec
      - build-android-armv7
      - build-android-arm64
      - build-linux-x64
      - build-armv7-libreelec
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
      - name: List release assets
        run: find release -type f -ls
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            Automated build release ${{ github.ref_name }}

            ## Addon Zips
            Each zip contains a complete Kodi addon ready to install via `Install from zip`.

            - `audiodecoder.openmpt-coreelec-aarch64.zip` — CoreELEC (AArch64)
            - `audiodecoder.openmpt-android-armv7.zip` — Chromecast / Android ARMv7
            - `audiodecoder.openmpt-android-arm64.zip` — NVIDIA Shield / Android arm64-v8a
            - `audiodecoder.openmpt-linux-x64.zip` — Desktop Linux (x86_64)
            - `audiodecoder.openmpt-libreelec-armv7.zip` — LibreELEC (ARMv7)
            - `audiodecoder.openmpt-windows-x64.zip` — Windows (x86_64) [EXPERIMENTAL]
          files: release/*/*.zip