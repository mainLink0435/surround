name: Cross-Compile Surround Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-aarch64-coreelec:
    name: CoreELEC (AArch64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout surround repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch Kodi Omega dev headers
        run: |
          git clone --depth 1 --single-branch --filter=blob:none --sparse -b Omega \
            https://github.com/xbmc/xbmc.git /tmp/xbmc-headers && \
          cd /tmp/xbmc-headers && \
          git sparse-checkout set xbmc/addons/kodi-dev-kit && \
          mkdir -p ${{ github.workspace }}/xbmc-headers/xbmc/addons/kodi-dev-kit && \
          cp -r xbmc/addons/kodi-dev-kit/include ${{ github.workspace }}/xbmc-headers/xbmc/addons/kodi-dev-kit/

      - name: Generate dockcross script
        run: docker run --rm dockcross/linux-arm64:latest > dockcross && chmod +x dockcross

      - name: Build libopenmpt engine (AArch64)
        run: |
          ./dockcross bash -c "
            cd /work/openmpt &&
            make -j$(nproc) TEST=0 EXAMPLES=0 OPENMPT123=0 IN_OPENMPT=0 XMP_OPENMPT=0 FUZZ=0 \
                 CONFIG=gcc LOCAL_ZLIB=1 MPT_COMPILER_NOVISIBILITY=1 \
                 install PREFIX=/work/install-shadow/aarch64
          "

      - name: Build audiodecoder.openmpt addon (AArch64)
        run: |
          ./dockcross bash -c "
            cd /work/audiodecoder.openmpt &&
            mkdir -p build && cd build &&
            cmake -DOPENMPT_INCLUDE_DIR=/work/install-shadow/aarch64/include \
                  -DOPENMPT_LIBRARY=/work/install-shadow/aarch64/lib/libopenmpt.so \
                  -DKODI_INCLUDE_DIR=/work/xbmc-headers/xbmc/addons/kodi-dev-kit/include \
                  .. &&
            make -j$(nproc)
          "

      - name: Package addon zip
        run: |
          mkdir -p addon-pack/audiodecoder.openmpt
          cp install-shadow/aarch64/lib/libopenmpt.so.6 addon-pack/audiodecoder.openmpt/
          cp audiodecoder.openmpt/build/audiodecoder.openmpt.so addon-pack/audiodecoder.openmpt/
          sed -e 's/@ADDON_DEPENDS@//g' \
              -e 's/@PLATFORM@/linux/g' \
              -e 's/@LIBRARY_FILENAME@/audiodecoder.openmpt.so/g' \
              audiodecoder.openmpt/audiodecoder.openmpt/addon.xml.in \
              > addon-pack/audiodecoder.openmpt/addon.xml
          cp -r audiodecoder.openmpt/audiodecoder.openmpt/resources addon-pack/audiodecoder.openmpt/ 2>/dev/null || true
          cp audiodecoder.openmpt/audiodecoder.openmpt/icon.png addon-pack/audiodecoder.openmpt/ 2>/dev/null || true
          cp audiodecoder.openmpt/audiodecoder.openmpt/fanart.jpg addon-pack/audiodecoder.openmpt/ 2>/dev/null || true
          cd addon-pack && zip -r ../audiodecoder.openmpt-coreelec-aarch64.zip audiodecoder.openmpt/

      - name: Upload addon zip
        uses: actions/upload-artifact@v4
        with:
          name: coreelec-aarch64
          path: audiodecoder.openmpt-coreelec-aarch64.zip

